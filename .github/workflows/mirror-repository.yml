name: Mirror Repository

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: mirror-repository
  cancel-in-progress: true

jobs:
  mirror:
    runs-on: ubuntu-latest
    env:
      MIRROR_AUTHOR_EMAIL: info@deskohub.cz
      MIRROR_AUTHOR_NAME: Deskohub
      MIRROR_BRANCH: main
      MIRROR_REPO: ${{ vars.MIRROR_REPO }}
      MIRROR_SSH_KEY: ${{ secrets.MIRROR_SSH_KEY }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Push squashed mirror commit
        run: |
          set -euo pipefail

          if [ -z "$MIRROR_REPO" ]; then
            echo "MIRROR_REPO repository variable is required" >&2
            exit 1
          fi

          if [ -z "$MIRROR_SSH_KEY" ]; then
            echo "MIRROR_SSH_KEY secret is required" >&2
            exit 1
          fi

          mirror_repository="${MIRROR_REPO#git@github.com:}"
          mirror_repository="${mirror_repository#https://github.com/}"
          mirror_repository="${mirror_repository%.git}"

          source_repository="$(printf '%s' "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')"
          mirror_repository_lower="$(printf '%s' "$mirror_repository" | tr '[:upper:]' '[:lower:]')"

          if [ "$mirror_repository_lower" = "$source_repository" ]; then
            echo "MIRROR_REPO must not point at this repository" >&2
            exit 1
          fi

          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s\n' "$MIRROR_SSH_KEY" > "$HOME/.ssh/mirror_key"
          chmod 600 "$HOME/.ssh/mirror_key"
          ssh-keyscan github.com >> "$HOME/.ssh/known_hosts"
          export GIT_SSH_COMMAND="ssh -i $HOME/.ssh/mirror_key -o IdentitiesOnly=yes -o UserKnownHostsFile=$HOME/.ssh/known_hosts"

          mirror_dir="$(mktemp -d)"
          git init -b "$MIRROR_BRANCH" "$mirror_dir"
          git archive HEAD | tar -x -C "$mirror_dir"
          rm -f "$mirror_dir/.github/workflows/mirror-repository.yml"

          git -C "$mirror_dir" add --force -A
          git -C "$mirror_dir" config user.name "$MIRROR_AUTHOR_NAME"
          git -C "$mirror_dir" config user.email "$MIRROR_AUTHOR_EMAIL"
          GIT_AUTHOR_NAME="$MIRROR_AUTHOR_NAME" \
            GIT_AUTHOR_EMAIL="$MIRROR_AUTHOR_EMAIL" \
            GIT_COMMITTER_NAME="$MIRROR_AUTHOR_NAME" \
            GIT_COMMITTER_EMAIL="$MIRROR_AUTHOR_EMAIL" \
            git -C "$mirror_dir" commit -m "Mirror main"

          git -C "$mirror_dir" remote add origin "git@github.com:${mirror_repository}.git"
          git -C "$mirror_dir" push --force origin "HEAD:$MIRROR_BRANCH"
