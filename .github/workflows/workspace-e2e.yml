name: Workspace E2E

on:
  repository_dispatch:
    types: [vercel.deployment.success]
  workflow_dispatch:
    inputs:
      sha:
        description: Exact commit SHA to test
        required: true
      url:
        description: Immutable Vercel preview URL
        required: true
      ref:
        description: Internal PR branch name
        required: true

permissions:
  contents: read
  pull-requests: read
  statuses: write

concurrency:
  group: workspace-e2e-pr-${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.event.client_payload.git.ref }}
  cancel-in-progress: true

jobs:
  resolve-target:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.client_payload.project.id == 'prj_7FliQBcbBiBwGaO2JLrigicnXCRd' &&
       github.event.client_payload.environment == 'preview')
    runs-on: ubuntu-latest
    outputs:
      eligible: ${{ steps.target.outputs.eligible }}
      head_ref: ${{ steps.target.outputs.head_ref }}
      pr_number: ${{ steps.target.outputs.pr_number }}
      sha: ${{ steps.target.outputs.sha }}
      url: ${{ steps.target.outputs.url }}
    steps:
      - name: Resolve eligible PR and immutable preview
        id: target
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.event.client_payload.git.ref }}
          TARGET_SHA: ${{ github.event_name == 'workflow_dispatch' && inputs.sha || github.event.client_payload.git.sha }}
          TARGET_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.url || github.event.client_payload.url }}
        run: |
          set -euo pipefail

          if [[ ! "$TARGET_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Target SHA is not a full Git commit SHA" >&2
            exit 1
          fi
          if ! git check-ref-format --branch "$TARGET_REF" >/dev/null; then
            echo "Target ref is not a valid branch name" >&2
            exit 1
          fi

          normalized_url="$({ TARGET_URL="$TARGET_URL" node <<'NODE'
          const url = new URL(process.env.TARGET_URL);
          const host = url.hostname.toLowerCase();
          if (
            url.protocol !== "https:" ||
            url.username ||
            url.password ||
            url.port ||
            url.pathname !== "/" ||
            url.search ||
            url.hash ||
            !/^[a-z0-9-]+\.vercel\.app$/.test(host) ||
            host.includes("-git-")
          ) {
            throw new Error("Target must be an immutable HTTPS Vercel deployment origin");
          }
          process.stdout.write(`https://${host}`);
          NODE
          } 2>/dev/null)" || {
            echo "Target must be an immutable HTTPS Vercel deployment origin" >&2
            exit 1
          }

          pulls="$(gh api \
            -H "Accept: application/vnd.github+json" \
            "repos/$GITHUB_REPOSITORY/commits/$TARGET_SHA/pulls")"
          eligible_pulls="$(jq \
            --arg repo "$GITHUB_REPOSITORY" \
            --arg ref "$TARGET_REF" \
            --arg sha "$TARGET_SHA" \
            '[.[] | select(
              .state == "open" and
              .draft == false and
              .head.repo.full_name == $repo and
              .head.ref == $ref and
              .head.sha == $sha and
              .user.login != "dependabot[bot]" and
              (.head.ref | startswith("dependabot/") | not)
            )]' <<<"$pulls")"
          eligible_count="$(jq 'length' <<<"$eligible_pulls")"

          if [[ "$eligible_count" == "0" ]]; then
            echo "No eligible open internal PR matches the exact deployment SHA"
            echo "eligible=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "$eligible_count" != "1" ]]; then
            echo "More than one eligible PR matches the exact deployment SHA" >&2
            exit 1
          fi

          pr_number="$(jq -r '.[0].number' <<<"$eligible_pulls")"
          {
            echo "eligible=true"
            echo "head_ref=$TARGET_REF"
            echo "pr_number=$pr_number"
            echo "sha=$TARGET_SHA"
            echo "url=$normalized_url"
          } >> "$GITHUB_OUTPUT"

  test-e2e:
    needs: resolve-target
    if: needs.resolve-target.outputs.eligible == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 50
    environment: workspace-checkout-e2e
    concurrency:
      group: workspace-e2e-dotypos-sandbox
      cancel-in-progress: false
    env:
      DOTYPOS_API_TIMEOUT: ${{ vars.WORKSPACE_E2E_DOTYPOS_API_TIMEOUT }}
      NEXI_API_ORIGIN: https://xpaysandbox.nexigroup.com/api/phoenix-0.0/psp
      NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
      TARGET_SHA: ${{ needs.resolve-target.outputs.sha }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
      WORKSPACE_E2E_BASE_URL: ${{ needs.resolve-target.outputs.url }}
      WORKSPACE_E2E_EXPECTED_CURRENCY: EUR

    steps:
      - name: Publish pending commit status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "repos/$GITHUB_REPOSITORY/statuses/$TARGET_SHA" \
            -f state=pending \
            -f context='Workspace E2E' \
            -f description='Protected preview E2E is running' \
            -f target_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            >/dev/null

      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-target.outputs.sha }}
          fetch-depth: 2

      - name: Confirm checked-out commit
        run: |
          set -euo pipefail
          actual_sha="$(git rev-parse HEAD)"
          if [[ "$actual_sha" != "$TARGET_SHA" ]]; then
            echo "Checked-out commit does not match the deployment SHA" >&2
            exit 1
          fi
          echo "Checked out exact deployment SHA $actual_sha"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - run: bun install --frozen-lockfile

      - name: Resolve Neon branch backing the preview
        id: preview-database
        env:
          HEAD_REF: ${{ needs.resolve-target.outputs.head_ref }}
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
        run: |
          set -euo pipefail

          if ! git check-ref-format --branch "$HEAD_REF" >/dev/null; then
            echo "Unsupported preview branch name" >&2
            exit 1
          fi
          branch_name="preview/$HEAD_REF"
          if ! git check-ref-format --branch "$branch_name" >/dev/null; then
            echo "Derived Neon preview branch name is invalid" >&2
            exit 1
          fi

          branch_id=""
          for _ in $(seq 1 12); do
            branches="$(bunx neonctl@2.30.1 branches list \
              --project-id "$NEON_PROJECT_ID" \
              --api-key "$NEON_API_KEY" \
              --output json)"
            matches="$(jq \
              --arg name "$branch_name" \
              '[(if type == "array" then . else .branches end)[] | select(.name == $name and .primary != true)]' \
              <<<"$branches")"
            match_count="$(jq 'length' <<<"$matches")"
            if [[ "$match_count" == "1" ]]; then
              branch_id="$(jq -r '.[0].id' <<<"$matches")"
              break
            fi
            if [[ "$match_count" != "0" ]]; then
              echo "Neon preview branch mapping is ambiguous" >&2
              exit 1
            fi
            sleep 5
          done

          if [[ ! "$branch_id" =~ ^br-[A-Za-z0-9-]+$ ]]; then
            echo "The integration-created Neon preview branch was not found" >&2
            exit 1
          fi
          echo "Matched immutable preview to Neon branch $branch_name ($branch_id)"

          direct_url="$(bunx neonctl@2.30.1 connection-string "$branch_id" \
            --project-id "$NEON_PROJECT_ID" \
            --role-name neondb_owner \
            --database-name neondb \
            --api-key "$NEON_API_KEY")"
          echo "::add-mask::$direct_url"
          pooled_url="$(bunx neonctl@2.30.1 connection-string "$branch_id" \
            --project-id "$NEON_PROJECT_ID" \
            --role-name neondb_owner \
            --database-name neondb \
            --pooled \
            --api-key "$NEON_API_KEY")"
          echo "::add-mask::$pooled_url"

          {
            echo "branch_id=$branch_id"
            echo "branch_name=$branch_name"
            echo "direct_url=$direct_url"
            echo "pooled_url=$pooled_url"
          } >> "$GITHUB_OUTPUT"

      - name: Migrate preview database
        working-directory: apps/deskohub-workspace
        env:
          DATABASE_URL: ${{ steps.preview-database.outputs.direct_url }}
          DATABASE_URL_UNPOOLED: ${{ steps.preview-database.outputs.direct_url }}
        run: bun run db:migrate

      - run: bun add -g agent-browser

      - run: agent-browser install --with-deps

      - name: Run checkout E2E
        working-directory: apps/deskohub-workspace
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          DATABASE_URL: ${{ steps.preview-database.outputs.pooled_url }}
          WORKSPACE_E2E_DATABASE_URL_UNPOOLED: ${{ steps.preview-database.outputs.direct_url }}
          WORKSPACE_E2E_DATABASE_ALLOWLIST: ${{ steps.preview-database.outputs.direct_url }}
          DOTYPOS_API_URL: ${{ secrets.WORKSPACE_E2E_DOTYPOS_API_URL }}
          DOTYPOS_CLIENT_ID: ${{ secrets.WORKSPACE_E2E_DOTYPOS_CLIENT_ID }}
          DOTYPOS_CLIENT_SECRET: ${{ secrets.WORKSPACE_E2E_DOTYPOS_CLIENT_SECRET }}
          DOTYPOS_REFRESH_TOKEN: ${{ secrets.WORKSPACE_E2E_DOTYPOS_REFRESH_TOKEN }}
          DOTYPOS_CLOUD_ID: ${{ secrets.WORKSPACE_E2E_DOTYPOS_CLOUD_ID }}
          DOTYPOS_BRANCH_ID: ${{ secrets.WORKSPACE_E2E_DOTYPOS_BRANCH_ID }}
          DOTYPOS_EMPLOYEE_ID: ${{ secrets.WORKSPACE_E2E_DOTYPOS_EMPLOYEE_ID }}
        run: bun run test:e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: workspace-e2e-artifacts-${{ github.run_id }}-${{ github.run_attempt }}
          path: apps/deskohub-workspace/e2e-artifacts/**
          if-no-files-found: ignore
          retention-days: 7

  publish-final-status:
    needs: [resolve-target, test-e2e]
    if: always() && needs.resolve-target.outputs.eligible == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Publish final commit status
        env:
          GH_TOKEN: ${{ github.token }}
          STATUS_STATE: ${{ needs.test-e2e.result == 'success' && 'success' || 'failure' }}
          TARGET_SHA: ${{ needs.resolve-target.outputs.sha }}
        run: |
          if [[ "$STATUS_STATE" == "success" ]]; then
            description='Protected preview E2E passed'
          else
            description='Protected preview E2E failed'
          fi
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "repos/$GITHUB_REPOSITORY/statuses/$TARGET_SHA" \
            -f state="$STATUS_STATE" \
            -f context='Workspace E2E' \
            -f description="$description" \
            -f target_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            >/dev/null
