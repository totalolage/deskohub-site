name: Workspace CI

permissions:
  contents: read

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, ready_for_review, converted_to_draft]

concurrency:
  group: workspace-ci-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate-workspace-migrations:
    if: github.event.action != 'converted_to_draft'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Validate Workspace migration count
        working-directory: apps/deskohub-workspace
        run: bun scripts/validate-migration-count.ts "${{ github.event.pull_request.base.sha }}"

  test-functional:
    if: github.event.action != 'converted_to_draft'
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: workspace_concurrency
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d workspace_concurrency"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - run: bun install --frozen-lockfile

      - run: bun turbo typecheck

      - run: bun turbo test --filter=./apps/deskohub-workspace
