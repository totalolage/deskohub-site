name: Workspace Tests

on:
  pull_request:
    paths:
      - .github/workflows/workspace-tests.yml
      - apps/deskohub-workspace/**
      - packages/**
      - bun.lock
      - package.json
  push:
    paths:
      - .github/workflows/workspace-tests.yml
      - apps/deskohub-workspace/**
      - packages/**
      - bun.lock
      - package.json

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - run: bun install --frozen-lockfile

      - run: bun run i18n:compile
        working-directory: apps/deskohub-workspace

      - run: bun test apps/deskohub-workspace
