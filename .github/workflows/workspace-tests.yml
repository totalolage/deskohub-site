name: Workspace CI

permissions:
  contents: read

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, ready_for_review, converted_to_draft]
    paths:
      - .vercelignore
      - .github/workflows/workspace-tests.yml
      - .github/workflows/workspace-e2e.yml
      - apps/deskohub-workspace/**
      - packages/**
      - bun.lock
      - package.json
      - tsconfig.json
      - turbo.json

concurrency:
  group: workspace-ci-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate-workspace-migrations:
    if: github.event.action != 'converted_to_draft'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Validate Workspace migration count
        working-directory: apps/deskohub-workspace
        run: bun scripts/validate-migration-count.ts "${{ github.event.pull_request.base.sha }}"

  test-functional:
    if: github.event.action != 'converted_to_draft'
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - run: bun install --frozen-lockfile

      - run: bun turbo test --filter=./apps/deskohub-workspace
