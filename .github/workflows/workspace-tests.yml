name: Workspace CI

permissions:
  contents: read

on:
  pull_request:
    branches: [main]
    paths:
      - .vercelignore
      - .github/workflows/workspace-tests.yml
      - apps/deskohub-workspace/**
      - packages/**
      - bun.lock
      - package.json
      - tsconfig.json
      - turbo.json

jobs:
  validate-workspace-migrations:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Validate Workspace migration count
        working-directory: apps/deskohub-workspace
        run: bun scripts/validate-migration-count.ts "${{ github.event.pull_request.base.sha }}"

  test-functional:
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - run: bun install --frozen-lockfile

      - run: bun turbo test --filter=./apps/deskohub-workspace

  test-e2e:
    needs: test-functional
    if: github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 50
    environment: workspace-checkout-e2e
    concurrency:
      group: workspace-e2e-new-workspace-alias
      cancel-in-progress: false
    env:
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
      VERCEL_ORG_ID: team_MgMQ4MEWijWnYa1R48C2JU5e
      VERCEL_TEAM_ID: team_MgMQ4MEWijWnYa1R48C2JU5e
      VERCEL_PROJECT_ID: prj_7FliQBcbBiBwGaO2JLrigicnXCRd
      WORKSPACE_E2E_ALIAS: new.workspace.deskohub.cz
      WORKSPACE_E2E_EXPECTED_CURRENCY: EUR
      DOTYPOS_API_TIMEOUT: ${{ vars.WORKSPACE_E2E_DOTYPOS_API_TIMEOUT }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - run: bun install --frozen-lockfile

      - name: Provision E2E database branch
        id: e2e-database
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: workspace-checkout-e2e-${{ github.run_id }}-${{ github.run_attempt }}
          parent_branch: production
          role: neondb_owner
          database: neondb
          api_key: ${{ secrets.NEON_API_KEY }}

      - name: Migrate E2E database
        run: bun run db:migrate
        working-directory: apps/deskohub-workspace
        env:
          DATABASE_URL: ${{ steps.e2e-database.outputs.db_url_pooled }}
          DATABASE_URL_UNPOOLED: ${{ steps.e2e-database.outputs.db_url }}

      - run: bun add -g agent-browser

      - run: agent-browser install --with-deps

      - name: Run checkout E2E
        run: bun run e2e:checkout
        working-directory: apps/deskohub-workspace
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          DATABASE_URL: ${{ steps.e2e-database.outputs.db_url_pooled }}
          WORKSPACE_E2E_DATABASE_URL_UNPOOLED: ${{ steps.e2e-database.outputs.db_url }}
          WORKSPACE_E2E_DATABASE_ALLOWLIST: ${{ steps.e2e-database.outputs.db_url }}
          DOTYPOS_API_URL: ${{ secrets.WORKSPACE_E2E_DOTYPOS_API_URL }}
          DOTYPOS_CLIENT_ID: ${{ secrets.WORKSPACE_E2E_DOTYPOS_CLIENT_ID }}
          DOTYPOS_CLIENT_SECRET: ${{ secrets.WORKSPACE_E2E_DOTYPOS_CLIENT_SECRET }}
          DOTYPOS_REFRESH_TOKEN: ${{ secrets.WORKSPACE_E2E_DOTYPOS_REFRESH_TOKEN }}
          DOTYPOS_CLOUD_ID: ${{ secrets.WORKSPACE_E2E_DOTYPOS_CLOUD_ID }}
          DOTYPOS_BRANCH_ID: ${{ secrets.WORKSPACE_E2E_DOTYPOS_BRANCH_ID }}
          DOTYPOS_EMPLOYEE_ID: ${{ secrets.WORKSPACE_E2E_DOTYPOS_EMPLOYEE_ID }}

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: workspace-e2e-artifacts-${{ github.run_id }}-${{ github.run_attempt }}
          path: apps/deskohub-workspace/e2e-artifacts/**
          if-no-files-found: ignore
          retention-days: 7

      - name: Delete E2E database branch
        if: always() && steps.e2e-database.outputs.branch_id != ''
        uses: neondatabase/delete-branch-action@v3.2.1
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: ${{ steps.e2e-database.outputs.branch_id }}
          api_key: ${{ secrets.NEON_API_KEY }}
