        priceWithoutVat:
          type: string
          description: Price without VAT (string representation)
        printTicket:
          type: boolean
          nullable: true
          description: Print ticket flag
        stockDeduct:
          type: boolean
          nullable: true
          description: Stock deduction flag
        subtitle:
          type: string
          nullable: true
          description: Product subtitle
        tags:
          oneOf:
            - type: array
              items:
                type: string
            - type: string
              nullable: true
          description: Product tags (can be array or string)
        translatedDescription:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/TranslatedStrings'
          description: Translated descriptions by locale
        translatedName:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/TranslatedStrings'
          description: Translated names by locale
        unit:
          type: string
          description: Unit of measurement (actual values vary from documented enum)
        vat:
          type: string
          description: VAT rate (string representation)
        versionDate:
          type: string
          description: Last modification timestamp (ISO 8601)
        deleted:
          type: boolean
          nullable: true
          description: Is deleted
        display:
          type: boolean
          nullable: true
          description: Is displayed

    Category:
      type: object
      properties:
        id:
          type: string
          description: Category ID (long as string)
        _cloudId:
          type: string
          description: Cloud ID (long as string)
        name:
          type: string
          description: Category name
        hexColor:
          type: string
          nullable: true
          description: Hex color for the category
        deleted:
          type: boolean
          description: Is deleted
        display:
          type: boolean
          description: Is displayed
        externalId:
          type: string
          nullable: true
          description: External ID
        flags:
          type: string
          description: Category flags (string representation of long)
        fiscalName:
          type: string
          nullable: true
          description: Fiscal name for the category
        ordering:
          type: string
          nullable: true
          description: Sort order (string representation)
        translatedName:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/TranslatedStrings'
          description: Translated names by locale
        versionDate:
          type: string
          description: Last modification timestamp (ISO 8601)
        tags:
          oneOf:
            - type: array
              items:
                type: string
            - type: "null"
          description: Category tags

    PaginatedCategories:
      allOf:
        - $ref: '#/components/schemas/PaginationBase'
        - type: object
          properties:
            data:
              type: array
              description: Array of categories
              items:
                $ref: '#/components/schemas/Category'

    PatchProductRequest:
      type: object
      additionalProperties: true
      description: Partial product object for PATCH requests

    DeleteProductRequest:
      type: object
      properties:
        productIsIngredient:
          type: string
          enum: [ERROR, PRESERVE, DELETE]
          description: Strategy when the product is an ingredient
        productHasIngredients:
          type: string
          enum: [ERROR, PRESERVE, DELETE]
          description: Strategy when the product has ingredients

    PatchCategoryRequest:
      type: object
      additionalProperties: true
      description: Partial category object for PATCH requests

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        error_description:
          type: string
        code:
          type: integer
