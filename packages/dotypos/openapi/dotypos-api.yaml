openapi: 3.0.3
info:
  title: Dotypos API
  description: Dotypos POS System API for managing reservations and authentication
  version: 2.0.0
servers:
  - url: https://api.dotykacka.cz/v2
    description: Production API server

security:
  - bearerAuth: []

paths:
  /signin/token:
    post:
      tags:
        - Authentication
      summary: Get access token from refresh token
      operationId: getAccessToken
      security: []
      parameters:
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
            description: User {refresh_token}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRequest'
      responses:
        '201':
          description: Successful authentication
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /clouds/{cloudId}/reservations:
    post:
      tags:
        - Reservations
      summary: Create a new reservation
      operationId: createReservation
      parameters:
        - name: cloudId
          in: path
          required: true
          schema:
            type: string
          description: Cloud ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/CreateReservationRequest'
              maxItems: 100
              description: Array of reservations to create (max 100)
      responses:
        '200':
          description: Reservations created successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Reservation'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      tags:
        - Reservations
      summary: List reservations
      operationId: listReservations
      parameters:
        - name: cloudId
          in: path
          required: true
          schema:
            type: string
          description: Cloud ID
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: List of reservations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedReservations'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Dotypos returns Not Found, sometimes with an empty body, when the cloud has no reservations.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags:
        - Reservations
      summary: Replace or create reservations
      operationId: replaceReservations
      parameters:
        - name: cloudId
          in: path
          required: true
          schema:
            type: string
          description: Cloud ID
        - $ref: '#/components/parameters/IfMatchParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/Reservation'
              maxItems: 100
      responses:
        '200':
          description: Reservations replaced successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Reservation'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /clouds/{cloudId}/reservations/{reservationId}:
    get:
      tags:
        - Reservations
      summary: Get reservation by ID
      operationId: getReservation
      parameters:
        - name: cloudId
          in: path
          required: true
          schema:
            type: string
          description: Cloud ID
        - name: reservationId
          in: path
          required: true
          schema:
            type: string
          description: Reservation ID
      responses:
        '200':
          description: Reservation details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reservation'
        '404':
          description: Reservation not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags:
        - Reservations
      summary: Update reservation
      operationId: updateReservation
      parameters:
        - name: cloudId
          in: path
          required: true
          schema:
            type: string
          description: Cloud ID
        - name: reservationId
          in: path
          required: true
          schema:
            type: string
          description: Reservation ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateReservationRequest'
      responses:
        '200':
          description: Reservation updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reservation'
        '404':
          description: Reservation not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    patch:
      tags:
        - Reservations
      summary: Partially update reservation
      operationId: patchReservation
      parameters:
        - name: cloudId
          in: path
          required: true
          schema:
            type: string
          description: Cloud ID
        - name: reservationId
          in: path
          required: true
          schema:
            type: string
          description: Reservation ID
        - $ref: '#/components/parameters/IfMatchRequiredParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateReservationRequest'
      responses:
        '200':
          description: Reservation updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reservation'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Reservation not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - Reservations
      summary: Cancel reservation
      operationId: cancelReservation
      parameters:
        - name: cloudId
          in: path
          required: true
          schema:
            type: string
          description: Cloud ID
        - name: reservationId
          in: path
          required: true
          schema:
            type: string
          description: Reservation ID
      responses:
        '200':
          description: Reservation cancelled successfully
        '404':
          description: Reservation not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /clouds/{cloudId}/customers:
    get:
      tags:
        - Customers
      summary: Get customers
      operationId: getCustomers
      parameters:
        - name: cloudId
          in: path
          required: true
          schema:
            type: string
        - name: filter
          in: query
          description: Filter customers (e.g., by email or phone)
          schema:
            type: string
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Paginated list of customers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCustomers'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
        - Customers
      summary: Create customers
      operationId: createCustomers
      parameters:
        - name: cloudId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/CreateCustomerRequest'
      responses:
        '200':
          description: Customers created successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Customer'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags:
        - Customers
      summary: Replace or create customers
      operationId: replaceCustomers
      parameters:
        - name: cloudId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/IfMatchParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/Customer'
      responses:
        '200':
          description: Customers replaced successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Customer'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /clouds/{cloudId}/tables:
    get:
      tags:
        - Tables
      summary: Get tables
      operationId: getTables
      parameters:
        - name: cloudId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Paginated list of tables
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedTables'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /clouds/{cloudId}/tables/{tableId}:
    get:
      tags:
        - Tables
      summary: Get table by ID
      operationId: getTable
      parameters:
        - name: cloudId
          in: path
          required: true
          schema:
            type: string
          description: Cloud ID
        - name: tableId
          in: path
          required: true
          schema:
            type: string
          description: Table ID
      responses:
        '200':
          description: Table details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Table'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Table not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /clouds/{cloudId}/products:
    get:
      tags:
        - Products
      summary: Get products
      operationId: getProducts
      parameters:
        - name: cloudId
          in: path
          required: true
          schema:
            type: string
          description: Cloud ID
        - name: filter
          in: query
          description: Filter products (e.g., "_categoryId|eq|123")
          schema:
            type: string
        - name: sort
          in: query
          description: Sort products (e.g., "name", "-priceWithVat")
          schema:
            type: string
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: include
          in: query
          description: Include related entities (comma-separated, e.g., "customizations,ingredients")
          schema:
            type: string
      responses:
        '200':
          description: Paginated list of products
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedProducts'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - Products
      summary: Create products
      operationId: createProducts
      parameters:
        - name: cloudId
          in: path
          required: true
          schema:
            type: string
          description: Cloud ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/Product'
              maxItems: 100
      responses:
        '200':
          description: Products created successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags:
        - Products
      summary: Replace or create products
      operationId: replaceProducts
      parameters:
        - name: cloudId
          in: path
          required: true
          schema:
            type: string
          description: Cloud ID
        - $ref: '#/components/parameters/IfMatchParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/Product'
              maxItems: 100
      responses:
        '200':
          description: Products replaced successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /clouds/{cloudId}/products/{productId}:
    get:
      tags:
        - Products
      summary: Get product by ID
      operationId: getProduct
      parameters:
        - name: cloudId
          in: path
          required: true
          schema:
            type: string
          description: Cloud ID
        - name: productId
          in: path
          required: true
          schema:
            type: string
          description: Product ID
        - name: include
          in: query
          description: Include related entities (comma-separated, e.g., "customizations,ingredients")
          schema:
            type: string
      responses:
        '200':
          description: Product details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags:
        - Products
      summary: Replace or create product
      operationId: replaceProduct
      parameters:
        - name: cloudId
          in: path
          required: true
          schema:
            type: string
          description: Cloud ID
        - name: productId
          in: path
          required: true
          schema:
            type: string
          description: Product ID
        - $ref: '#/components/parameters/IfMatchParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Product'
      responses:
        '200':
          description: Product replaced successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    patch:
      tags:
        - Products
      summary: Partially update product
      operationId: patchProduct
      parameters:
        - name: cloudId
          in: path
          required: true
          schema:
            type: string
          description: Cloud ID
        - name: productId
          in: path
          required: true
          schema:
            type: string
          description: Product ID
        - $ref: '#/components/parameters/IfMatchRequiredParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchProductRequest'
      responses:
        '200':
          description: Product updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - Products
      summary: Delete product
      operationId: deleteProduct
      parameters:
        - name: cloudId
          in: path
          required: true
          schema:
            type: string
          description: Cloud ID
        - name: productId
          in: path
          required: true
          schema:
            type: string
          description: Product ID
        - $ref: '#/components/parameters/IfMatchParam'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteProductRequest'
      responses:
        '200':
          description: Product deleted successfully
          content:
            application/json:
              schema:
                type: object
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Product delete conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'


  /clouds/{cloudId}/categories:
    get:
      summary: Get product categories
      operationId: getCategories
      tags:
        - Categories
      parameters:
