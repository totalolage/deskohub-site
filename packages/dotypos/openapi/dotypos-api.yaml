          nullable: true
          description: Minimum margin (string representation)
        modifiedBy:
          type: string
          nullable: true
          description: Modified by user ID
        packaging:
          type: string
          nullable: true
          description: Packaging information
        packageSize:
          type: string
          nullable: true
          description: Package size (string representation)
        points:
          type: string
          nullable: true
          description: Points value (string representation)
        priceWithVat:
          type: string
          nullable: true
