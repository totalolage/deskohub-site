<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Deskohub</title>
    <meta
      name="description"
      content="Deskohub portal with links to Workspace and Boardgame Bar."
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="portal-shell min-h-screen antialiased">
    <main class="portal-grid" aria-label="Deskohub portal">
      <h1 class="portal-title">Deskohub</h1>

      <nav class="portal-panels" aria-label="Deskohub products">
        <a class="portal-panel portal-panel-workspace" href="https://workspace.deskohub.cz">
          <span class="portal-panel-inner">
            <span class="portal-kicker">Deskohub</span>
            <span class="portal-heading">Workspace</span>
            <span class="portal-description">Focused desks, refined operations, and a premium place to work.</span>
            <span class="portal-label">workspace.deskohub.cz</span>
          </span>
        </a>

        <a class="portal-panel portal-panel-bar" href="https://bar.deskohub.cz">
          <span class="portal-panel-inner">
            <span class="portal-kicker">Deskohub</span>
            <span class="portal-heading">Boardgame Bar</span>
            <span class="portal-description">Games, people, and a late-night social energy with lounge momentum.</span>
            <span class="portal-label">bar.deskohub.cz</span>
          </span>
        </a>
      </nav>
    </main>
  </body>
</html>
